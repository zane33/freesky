services:
  freesky:
    # Build from local repository Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: 3000
        API_URL: http://192.168.3.148:3000
        BACKEND_PORT: 8005
    
    # Replace with actual container ID/name or comment out for default networking
    network_mode: host
    
    # Ports are not needed when using container networking
    # Comment out if using container networking
    #ports:
    #  - "3000:3000"
    #  - "${BACKEND_PORT:-8005}:${BACKEND_PORT:-8005}"
    #  - "2019:2019"  # Expose Caddy admin port for debugging
    
    environment:
      # Application Configuration
      - PORT=3000
      - BACKEND_PORT=${BACKEND_PORT:-8005}
      - HOST_IP=${HOST_IP:-0.0.0.0}  # Dynamic host IP, will use 0.0.0.0 if not set
      - DOCKER_HOST_IP=192.168.3.148  # External hostname/IP for client-facing URLs
      - BACKEND_URI=${BACKEND_URI:-}  # Let rxconfig determine this dynamically
      - API_URL=http://192.168.3.148:3000  # Explicitly set for correct WebSocket connection
      
      # External Services
      - DADDYLIVE_URI=${DADDYLIVE_URI:-https://dlhd.st}
      
      # Application Settings
      - CHANNEL_PREFS_FILE=/app/data/channel_prefs.json  # Persisted via the ./data volume below
      - USERS_FILE=/app/data/users.json
      - APP_SETTINGS_FILE=/app/data/app_settings.json
      # Seed for the trusted-subnet allowlist on a fresh install; once saved in
      # Settings the stored value wins. Clients here skip login entirely.
      - TRUSTED_NETWORKS=${TRUSTED_NETWORKS:-}
      # First-run bootstrap only — ignored once a user exists, so changing the
      # admin password in the UI is not undone on restart. CHANGE THESE.
      - ADMIN_USER=${ADMIN_USER:-admin}
      # Leave ADMIN_PASS unset to have a random one generated and printed to the
      # container log on first boot. No weak default ships.
      - ADMIN_PASS=${ADMIN_PASS:-}
      # HTTPS. Default is plain HTTP. ENABLE_HTTPS=true ADDS a TLS listener on
      # HTTPS_PORT while PORT keeps serving plain HTTP — one port cannot do both,
      # and taking HTTP away broke every existing playlist URL. start.sh generates
      # a self-signed cert into ./data/certs, or uses your own cert.pem/key.pem.
      - ENABLE_HTTPS=${ENABLE_HTTPS:-false}
      - HTTPS_PORT=${HTTPS_PORT:-3443}
      # Extra names/IPs to put in the self-signed cert (comma separated).
      # DOCKER_HOST_IP is included automatically. A client connecting by IP only
      # matches IP entries, so the address you actually browse to must be here.
      - TLS_HOSTS=${TLS_HOSTS:-media.authorisedit.co.nz}
      # Advanced overrides, normally left empty — start.sh fills them in. Compose
      # uses ${VAR:-default}, NOT Caddy's ${VAR:default} form; mixing the two here
      # is what produced "invalid interpolation format".
      - SITE_ADDRESS=${SITE_ADDRESS:-}
      - CADDY_TLS=${CADDY_TLS:-}
      # Keeps Caddy's generated CA and any issued certs on the data volume, so a
      # restart doesn't mint a new self-signed CA (or re-hit Let's Encrypt limits).
      - XDG_DATA_HOME=/app/data
      - PROXY_CONTENT=${PROXY_CONTENT:-TRUE}
      - SOCKS5=${SOCKS5:-}
      # One async worker. Multiple granian workers each hold a DIFFERENT in-memory
      # encryption key (utils.py key_bytes = os.urandom at import), so a content
      # URL minted by one worker fails to decrypt on another; granian was also
      # cycling worker-1 every ~15s, dropping in-flight streams. A single worker is
      # I/O-bound and fine for this load, and sidesteps both.
      - WORKERS=${WORKERS:-1}
      - MAX_CONCURRENT_STREAMS=${MAX_CONCURRENT_STREAMS:-5}  # Reduced from 10 to 5
      
      # Reflex Framework Settings
      - REFLEX_ENV=prod
      - REFLEX_SKIP_COMPILE=1
      
      # Proxy Configuration
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
    
    # Channel enable/disable choices must outlive the container. So must the logo
    # cache — without it every restart re-fetches ~900 logos from upstream.
    volumes:
      - ./data:/app/data
      - ./data/logo-cache:/app/logo-cache

    # Resource Limits
    deploy:
      resources:
        limits:
          memory: 512M  # Reduced from 1G to 512M
        reservations:
          memory: 256M  # Reduced from 512M to 256M
    
    # Restart Policy
    restart: unless-stopped
    
    # Health Check
    healthcheck:
      # CMD-SHELL, not CMD: exec form has no shell, so "||" and "exit" were passed
      # to curl as extra URLs and the check failed even when the app was healthy.
      # Probes the backend directly on plain HTTP. Hitting Caddy's port would fail
      # the moment TLS is enabled, marking a perfectly healthy container unhealthy.
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8005}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
